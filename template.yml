AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31

Description: >
  GitHub PR Auditor

Parameters:
  KMSDecryptSSMKeyID:
    Type: String
    Description: The KMS Key used to decrypt SSM parameters

  GitHubTokenSSMPath:
    Type: String
    Description: The path to the SSM Parameter containing the Rewind API auth token
    Default: /devops/github/pr-auditor-pat

  LastTimeCheckedSSMPath:
    Type: String
    Description: The path to the SSM Parameter containing the Rewind API auth token
    Default: /devops/github/pr-auditor-last-time-checked

  GitHubOrgName:
    Type: String
    Description: The org to scan
    Default: rewindio

  AlarmSNSTopicArn:
    Type: String
    Description: SNS topic ARN to send cloudwatch alerts to (regional)

  LambdaRate:
    Description: >
      The rate (frequency) that determines when CloudWatch Events runs the rule that
      triggers the Lambda function. See https://docs.aws.amazon.com/AmazonCloudWatch/latest/events/ScheduledEvents.html
    Default: rate(1 day)
    Type: String

Resources:
  AuditorLambdaFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: src/
      Handler: lambda.handler
      MemorySize: 384
      ReservedConcurrentExecutions: 1
      Role: !GetAtt LambdaRole.Arn
      Runtime: ruby2.7
      Timeout: 300
      Layers:
        - !Ref AuditorLambdaLayer
      Environment:
        Variables:
          GITHUB_ORG_NAME: !Ref GitHubOrgName
          GITHUB_TOKEN_SSM_PATH: !Ref GitHubTokenSSMPath
          LAST_TIME_CHECKED_SSM_PATH: !Ref LastTimeCheckedSSMPath
    Tags:
      function: github-pr-auditor
      service: common
      platform: common
      lambda: github-pr-auditor
      region: !Ref AWS::Region

  AuditorLambdaLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: github-pr-auditor-dependencies
      Description: Dependencies for github-pr-auditor
      ContentUri: lambda_layer
      CompatibleRuntimes:
        - ruby2.7
      RetentionPolicy: Retain
    Metadata:
      BuildMethod: makefile

  LambdaSchedule:
    Type: "AWS::Events::Rule"
    Properties:
      Description: >
        A schedule for the Lambda function.
      ScheduleExpression: !Ref LambdaRate
      State: ENABLED
      Targets:
        - Arn: !Sub ${AuditorLambdaFunction.Arn}
          Id: LambdaSchedule

  LambdaSchedulePermission:
    Type: "AWS::Lambda::Permission"
    Properties:
      Action: "lambda:InvokeFunction"
      FunctionName: !Sub ${AuditorLambdaFunction.Arn}
      Principal: "events.amazonaws.com"
      SourceArn: !Sub ${LambdaSchedule.Arn}

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Join ["", ["/aws/lambda/", !Ref AuditorLambdaFunction]]

  LambdaLogPermissions:
    Type: AWS::IAM::Policy
    Properties:
      Roles:
        - !Ref LambdaRole
      PolicyName: lambda-logs
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource:
              - !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AuditorLambdaFunction}"
              - !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AuditorLambdaFunction}:*"
              - !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AuditorLambdaFunction}:*:*"

  LambdaSSMPermissions:
    Type: AWS::IAM::Policy
    Properties:
      Roles:
        - !Ref LambdaRole
      PolicyName: lambda-ssm
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - kms:Decrypt*
            Resource:
              - !Sub arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/${KMSDecryptSSMKeyID}
          - Effect: Allow
            Action:
              - ssm:GetParametersByPath
              - ssm:GetParameters
              - ssm:GetParameter
              - ssm:PutParameter
              - ssm:DescribeParameters
            Resource:
              - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GitHubTokenSSMPath}
              - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${LastTimeCheckedSSMPath}

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "AllowLambdaServiceToAssumeRole"
            Effect: "Allow"
            Action:
              - "sts:AssumeRole"
            Principal:
              Service:
                - "lambda.amazonaws.com"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LastTimeCheckedParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Ref LastTimeCheckedSSMPath
      Type: String
      Value: "null"
      Description: "Keeps track of the last time PRs were checked (stored in ISO8601)"

  EmergencyChangeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: GitHub PR emergency change
      AlarmDescription: Alarm if there has been an emergency change
      MetricName: GitHubEmergencyChange
      Namespace: GitHubAuditing
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmSNSTopicArn
      ComparisonOperator: GreaterThanOrEqualToThreshold

  EmergencyChangeFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref LambdaLogGroup
      FilterPattern: |-
        "The required number of approvers for" "was not met!"
      MetricTransformations:
        - MetricValue: "1"
          MetricNamespace: GitHubAuditing
          MetricName: GitHubEmergencyChange

  MissingRepoProtections:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: GitHub Repo MissingProtections
      AlarmDescription: Alarm if a default branch is missing protections
      MetricName: GitHubMissingRepoProtections
      Namespace: GitHubAuditing
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmSNSTopicArn
      ComparisonOperator: GreaterThanOrEqualToThreshold

  MissingRepoProtectionsFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref LambdaLogGroup
      FilterPattern: |-
        Unable to get branch protections summary
      MetricTransformations:
        - MetricValue: "1"
          MetricNamespace: GitHubAuditing
          MetricName: GitHubMissingRepoProtections

Outputs:
  LambdaFunction:
    Description: The lambda function
    Value: !Ref AuditorLambdaFunction
  LambdaLogGroup:
    Description: The lambda log group
    Value: !Ref LambdaLogGroup
